<g opacity="0.08">
<text x="40" y="60" fill="#94A3B8" font-family="monospace" font-size="13">const agent = new OpenHands()</text>
<text x="40" y="80" fill="#94A3B8" font-family="monospace" font-size="13">await agent.solve(issue)</text>
<text x="40" y="100" fill="#94A3B8" font-family="monospace" font-size="13">agent.writeCode(plan)</text>
<text x="40" y="120" fill="#94A3B8" font-family="monospace" font-size="13">agent.runTests()</text>
<text x="40" y="140" fill="#94A3B8" font-family="monospace" font-size="13">agent.submitPR()</text>
<text x="800" y="500" fill="#94A3B8" font-family="monospace" font-size="13">if (tests.pass) merge()</text>
<text x="800" y="520" fill="#94A3B8" font-family="monospace" font-size="13">else agent.debug()</text>
<text x="800" y="540" fill="#94A3B8" font-family="monospace" font-size="13">return result</text>
<text x="800" y="560" fill="#94A3B8" font-family="monospace" font-size="13">// autonomous loop</text>
<text x="400" y="580" fill="#94A3B8" font-family="monospace" font-size="13">git commit -m "fix: resolved issue #2847"</text>
<text x="200" y="600" fill="#94A3B8" font-family="monospace" font-size="13">docker run --rm openhands:latest</text>
